<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Model Usage — MazerDaze</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #060608;
      color: #00cc66;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      padding: 40px 24px;
    }
    h1 { font-size: 1.3rem; margin-bottom: 4px; }
    .subtitle { color: #007a3d; font-size: 0.8rem; margin-bottom: 40px; }
    .chart-wrap {
      background: #0a0c0f;
      border: 1px solid #00cc6622;
      padding: 24px;
      margin-bottom: 32px;
    }
    .chart-title { font-size: 0.8rem; color: #007a3d; margin-bottom: 16px; }
    canvas { max-height: 380px; }
    .note { font-size: 0.72rem; color: #005522; margin-top: 8px; line-height: 1.9; }
    a { color: #007a3d; text-decoration: none; }
    a:hover { color: #00cc66; }
    #loading { color: #007a3d; padding: 40px 0; }
    #error { color: #cc3300; padding: 20px 0; display: none; }
  </style>
</head>
<body>

<h1>&gt; MODEL_USAGE.SH</h1>
<p class="subtitle" id="updated">Loading...</p>

<div id="loading">&gt; fetching data...</div>
<div id="error"></div>

<div id="content" style="display:none">
  <div class="chart-wrap">
    <div class="chart-title">Daily cost by model — each grid line = $10</div>
    <canvas id="costChart"></canvas>
  </div>

  <p class="note">
    * April data estimated from Anthropic console. Ollama = $0 (local RTX 3060), shown as activity marker.<br>
    * Updated nightly · <a href="/">← mazerdaze.com</a>
  </p>
</div>

<script>
const gridColor  = '#00cc6628';
const tickColor  = '#005522';

fetch('/model-usage-data.json?t=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    const { labels, sonnet, haiku, ollama_turns, updated } = data;

    const dt = updated
      ? new Date(updated).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})
      : '—';
    document.getElementById('updated').textContent =
      `Daily AI spend by model · Updated ${dt}`;

    // Ollama shown as a small $1 stub per turn (purely visual — marks activity)
    const ollamaBar = ollama_turns.map(t => t > 0 ? 1 : 0);

    new Chart(document.getElementById('costChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: 'Sonnet 4.6',
            data: sonnet,
            backgroundColor: '#ff6b9d',
            stack: 's',
          },
          {
            label: 'Haiku 4.5',
            data: haiku,
            backgroundColor: '#b8a96a',
            stack: 's',
          },
          {
            label: 'Ollama (local · free)',
            data: ollamaBar,
            backgroundColor: '#00cc66',
            stack: 's',
          },
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            labels: { color: '#00cc66', font: { family: 'Share Tech Mono', size: 11 } }
          },
          tooltip: {
            callbacks: {
              label: ctx => {
                if (ctx.dataset.label.includes('Ollama')) {
                  return ` Ollama: ${ollama_turns[ctx.dataIndex]} turn(s) — $0.00`;
                }
                return ` ${ctx.dataset.label}: ~$${ctx.raw}`;
              }
            }
          }
        },
        scales: {
          x: {
            stacked: true,
            ticks: { color: tickColor, font: { size: 10 } },
            grid: { color: gridColor }
          },
          y: {
            stacked: true,
            ticks: {
              color: tickColor,
              stepSize: 10,
              callback: () => '─',  // hash mark only, no number
            },
            grid: { color: gridColor, lineWidth: 1 },
          }
        }
      }
    });
  })
  .catch(err => {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.textContent = '> error: ' + err.message;
  });
</script>
</body>
</html>
