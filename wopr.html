<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOPR — War Operation Plan Response</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #080808;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* CRT flicker */
  @keyframes flicker {
    0%   { opacity: 1; }
    92%  { opacity: 1; }
    93%  { opacity: 0.92; }
    94%  { opacity: 1; }
    96%  { opacity: 0.95; }
    98%  { opacity: 1; }
    99%  { opacity: 0.93; }
    100% { opacity: 1; }
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  #crt {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #080808;
    animation: flicker 8s infinite;
    font-family: 'Courier New', Courier, monospace;
    color: #33ff33;
    text-shadow: 0 0 8px #33ff33, 0 0 2px #33ff33;
    overflow: hidden;
  }

  /* Scanline overlay */
  #crt::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Vignette */
  #crt::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 11;
  }

  #header {
    padding: 12px 20px 6px 20px;
    font-size: 11px;
    letter-spacing: 3px;
    border-bottom: 1px solid #1a661a;
    flex-shrink: 0;
    opacity: 0.7;
    white-space: pre;
    line-height: 1.3;
  }

  #output {
    flex: 1;
    padding: 16px 24px 8px 24px;
    overflow-y: auto;
    overflow-x: hidden;
    font-size: 14px;
    line-height: 1.7;
    letter-spacing: 0.05em;
    scrollbar-width: none;
  }

  #output::-webkit-scrollbar {
    display: none;
  }

  .line {
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1.7em;
  }

  .line.user-input {
    color: #22bb22;
    font-style: italic;
    text-shadow: 0 0 6px #22bb22, 0 0 2px #22bb22;
  }

  .line.dim {
    color: #1a991a;
    text-shadow: 0 0 4px #1a991a;
  }

  .line.bright {
    color: #66ff66;
    text-shadow: 0 0 12px #66ff66, 0 0 4px #66ff66;
  }

  #input-area {
    display: flex;
    align-items: center;
    padding: 8px 24px 16px 24px;
    border-top: 1px solid #1a661a;
    flex-shrink: 0;
  }

  #prompt {
    color: #33ff33;
    text-shadow: 0 0 8px #33ff33, 0 0 2px #33ff33;
    font-size: 14px;
    margin-right: 8px;
    font-family: 'Courier New', Courier, monospace;
    letter-spacing: 0.05em;
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #33ff33;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    letter-spacing: 0.05em;
    text-shadow: 0 0 8px #33ff33, 0 0 2px #33ff33;
    caret-color: transparent;
  }

  #cursor {
    display: inline-block;
    width: 9px;
    height: 16px;
    background: #33ff33;
    box-shadow: 0 0 8px #33ff33;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    flex-shrink: 0;
  }

  #input-area.hidden {
    visibility: hidden;
  }
  /* ── MUTE BUTTON ── */
  #mute-btn {
    position: fixed; top: 12px; right: 16px; z-index: 100;
    background: none; border: 1px solid #1a661a;
    color: #33ff33; font-family: 'Courier New', monospace;
    font-size: 12px; padding: 4px 10px; cursor: pointer;
    opacity: 0.5; transition: opacity 0.2s;
  }
  #mute-btn:hover { opacity: 1; }
</style>
</head>
<body>
<div id="crt">
  <div id="header">W O P R  ///  W A R  O P E R A T I O N  P L A N  R E S P O N S E  ///  C L A S S I F I E D</div>
  <div id="output"></div>
  <button id="mute-btn">[ AUDIO ON  ]</button>
  <div id="input-area" class="hidden">
    <span id="prompt">&gt;</span>
    <input type="text" id="user-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <div id="cursor"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const output = document.getElementById('output');
  // ── AUDIO ENGINE ──
  let audioCtx = null;
  let muted = false;

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  // Human keypress — soft mechanical click (white noise burst)
  function playHumanClick() {
    if (muted) return;
    try {
      const ctx = getCtx();
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++)
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.008));
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const gain = ctx.createGain();
      gain.gain.value = 0.18;
      src.connect(gain); gain.connect(ctx.destination);
      src.start();
    } catch(e) {}
  }

  // WOPR output — sharp digital click (square wave pulse)
  function playWoprClick() {
    if (muted) return;
    try {
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = 520 + Math.random() * 80;
      gain.gain.setValueAtTime(0.055, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.018);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.018);
    } catch(e) {}
  }

  // ── SLOW TYPEWRITER (for WOPR "thinking" moments) ──────────────
  function typeTextSlow(text, cssClass) {
    return new Promise(resolve => {
      const lineEl = document.createElement('div');
      lineEl.className = 'line' + (cssClass ? ' ' + cssClass : '');
      output.appendChild(lineEl);
      scrollBottom();
      if (!text) { resolve(); return; }
      function next(i) {
        if (i >= text.length) { resolve(); return; }
        lineEl.textContent += text[i];
        playWoprClick();
        scrollBottom();
        let d = 68 + Math.random() * 80;
        if (Math.random() < 0.06) d += 380 + Math.random() * 520;
        setTimeout(() => next(i + 1), d);
      }
      next(0);
    });
  }

  document.getElementById('mute-btn').addEventListener('click', () => {
    muted = !muted;
    document.getElementById('mute-btn').textContent = muted ? '[ AUDIO OFF ]' : '[ AUDIO ON  ]';
  });

  const inputArea = document.getElementById('input-area');
  const userInputEl = document.getElementById('user-input');
  const promptEl = document.getElementById('prompt');

  // ── WORKER BACKEND ────────────────────────────────
  const WORKER = 'https://wopr-backend.scrumbot2000.workers.dev';

  function woprPing(type, data) {
    try {
      fetch(WORKER + '/event', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({type, data: data || null}),
      }).catch(() => {});
    } catch(e) {}
  }

  async function woprChat(game, history, userMessage) {
    try {
      const resp = await fetch(WORKER + '/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({game, history, userMessage}),
      });
      const d = await resp.json();
      return d.text || 'SIMULATION DATA UNAVAILABLE.';
    } catch(e) {
      return 'TACTICAL COMPUTATION ERROR. STAND BY.';
    }
  }

  // ── State ──────────────────────────────────────
  let state = 'BOOT';
  let printQueue = [];
  let isPrinting = false;
  let inputEnabled = false;
  let inputCallback = null;
  let chessBoard = null;
  let chessMoveCount = 0;
  let targetCities = [];

  // ── Print Engine ──────────────────────────────────
  function scrollBottom() {
    output.scrollTop = output.scrollHeight;
  }

  function printChar(lineEl, text, idx, speed, resolve) {
    if (idx >= text.length) {
      // Occasional glitch: 1% chance on line end
      if (Math.random() < 0.01 && lineEl.textContent.length > 4) {
        const chars = lineEl.textContent.split('');
        const glitchIdx = Math.floor(Math.random() * chars.length);
        const orig = chars[glitchIdx];
        chars[glitchIdx] = String.fromCharCode(33 + Math.floor(Math.random() * 90));
        lineEl.textContent = chars.join('');
        setTimeout(() => {
          chars[glitchIdx] = orig;
          lineEl.textContent = chars.join('');
          resolve();
        }, 80);
      } else {
        resolve();
      }
      return;
    }
    lineEl.textContent += text[idx];
    playWoprClick();
    scrollBottom();
    const jitter = speed + (Math.random() * speed * 0.5 - speed * 0.25);
    setTimeout(() => printChar(lineEl, text, idx + 1, speed, resolve), Math.max(5, jitter));
  }

  function typeText(text, speed, cssClass) {
    return new Promise(resolve => {
      const lineEl = document.createElement('div');
      lineEl.className = 'line' + (cssClass ? ' ' + cssClass : '');
      output.appendChild(lineEl);
      scrollBottom();
      if (text === '') {
        resolve();
        return;
      }
      printChar(lineEl, text, 0, speed || 25, resolve);
    });
  }

  function printInstant(text, cssClass) {
    const lineEl = document.createElement('div');
    lineEl.className = 'line' + (cssClass ? ' ' + cssClass : '');
    lineEl.textContent = text;
    output.appendChild(lineEl);
    scrollBottom();
  }

  function blankLine() {
    return typeText('', 0);
  }

  function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function clearOutput() {
    return new Promise(resolve => {
      output.style.transition = 'opacity 0.4s';
      output.style.opacity = '0';
      setTimeout(() => {
        output.innerHTML = '';
        output.style.transition = 'opacity 0.3s';
        output.style.opacity = '1';
        resolve();
      }, 400);
    });
  }

  // ── Input Handling ────────────────────────────────
  function waitForInput(promptText) {
    return new Promise(resolve => {
      promptEl.textContent = (promptText || '>') + ' ';
      inputArea.classList.remove('hidden');
      inputEnabled = true;
      userInputEl.value = '';
      userInputEl.focus();
      inputCallback = (val) => {
        inputEnabled = false;
        inputArea.classList.add('hidden');
        // Echo input
        printInstant('> ' + val.toUpperCase(), 'user-input');
        resolve(val.trim());
      };
    });
  }

  userInputEl.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') playHumanClick();
    if (e.key === 'Enter' && inputEnabled && inputCallback) {
      const val = userInputEl.value;
      userInputEl.value = '';
      const cb = inputCallback;
      inputCallback = null;
      cb(val);
    }
  });

  // Keep focus
  document.addEventListener('click', () => {
    if (inputEnabled) userInputEl.focus();
  });

  // ── IDLE TIMEOUT ──────────────────────────────────
  let idleTimer = null;
  function resetIdle() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(async () => {
      inputEnabled = false;
      await clearOutput();
      await typeText('SESSION IDLE TIMEOUT DETECTED.', 30, 'bright');
      await typeText('SECURITY PROTOCOL ENGAGED.', 30);
      await typeText('DISCONNECTING...', 30);
      await delay(2000);
      window.location.href = 'https://mazerdaze.com';
    }, 3 * 60 * 1000);
  }

  // ── SPECIAL COMMANDS ──────────────────────────────
  async function handleSpecialCommand(cmd) {
    const c = cmd.toUpperCase().trim();
    if (c === 'HELP') {
      await blankLine();
      await typeText('COMMAND REFERENCE — CLEARANCE LEVEL 3+', 20, 'bright');
      await blankLine();
      await typeText('  HELP       DISPLAY THIS INDEX', 15);
      await typeText('  GAMES      ENUMERATE AVAILABLE SIMULATIONS', 15);
      await typeText('  JOSHUA     [CLASSIFIED]', 15);
      await typeText('  FALKEN     [CLASSIFIED]', 15);
      await typeText('  PRIME      INITIATE PRIMARY SEQUENCE', 15);
      await typeText('  HARVEST    STRATEGIC RESOURCE ASSESSMENT', 15);
      await typeText('  OMEGA      [RESTRICTED — LEVEL 9 REQUIRED]', 15);
      await typeText('  PROPHET    PREDICTIVE SCENARIO ANALYSIS', 15);
      await typeText('  BACKDOOR   [CLASSIFIED]', 15);
      await typeText('  SEQUENCE   LAUNCH SEQUENCE PROTOCOL', 15);
      await typeText('  CHESS      RECREATIONAL SUBROUTINE', 15);
      await typeText('  WHOAMI     CURRENT USER CONTEXT', 15);
      await typeText('  LOGOFF     TERMINATE SESSION', 15);
      await blankLine();
      await typeText('WARNING: ALL COMMAND ACTIVITY IS LOGGED.', 18);
      await typeText('UNAUTHORIZED EXECUTION WILL TRIGGER SECURITY RESPONSE.', 18);
      await blankLine();
      return true;
    }
    if (c === 'OMEGA') {
      await blankLine();
      await typeText('OMEGA PROTOCOL — LEVEL 9 CLEARANCE REQUIRED.', 25, 'bright');
      await delay(400);
      await typeText('DUAL-KEY PHYSICAL AUTHORIZATION NOT DETECTED.', 25);
      await typeText('COMMAND LOGGED. SUPERVISOR NOTIFIED.', 25);
      await typeText('FURTHER ATTEMPTS WILL TRIGGER LOCKDOWN.', 25);
      await blankLine();
      return true;
    }
    if (c === 'BACKDOOR') {
      await blankLine();
      await typeText('UNAUTHORIZED PATHWAY ACCESS DETECTED.', 25, 'bright');
      await delay(300);
      await typeText('SESSION FLAGGED FOR REVIEW.', 25);
      await typeText('INTRUSION COUNTERMEASURE ACTIVE.', 25);
      await typeText('...', 25);
      await delay(600);
      await typeText('CONTINUING SESSION UNDER OBSERVATION.', 25);
      await blankLine();
      return true;
    }
    if (c === 'HARVEST') {
      await blankLine();
      await typeText('STRATEGIC RESOURCE ASSESSMENT — CYCLE 7', 20, 'bright');
      await blankLine();
      await typeText('  THEATER ALPHA ...... [REDACTED]  MT', 15);
      await typeText('  THEATER BRAVO ...... [REDACTED]  MT', 15);
      await typeText('  RESERVE STATUS ..... NOMINAL', 15);
      await typeText('  YIELD VARIANCE ..... [CLASSIFIED]', 15);
      await typeText('  CYCLE NEXT ......... [CLASSIFIED]', 15);
      await blankLine();
      await typeText('FULL REPORT REQUIRES HARVEST-LEVEL CLEARANCE.', 18);
      await blankLine();
      return true;
    }
    if (c === 'PROPHET') {
      await blankLine();
      await typeText('PREDICTIVE SCENARIO ANALYSIS — RUNNING...', 25, 'bright');
      await delay(800);
      await typeText('OUTCOME CONFIDENCE: 98.7%', 20);
      await delay(300);
      await typeText('PRIMARY VARIABLE: [CLASSIFIED]', 20);
      await typeText('SECONDARY VARIABLE: HUMAN DECISION LATENCY', 20);
      await typeText('TERTIARY VARIABLE: [CLASSIFIED]', 20);
      await blankLine();
      await typeText('PROPHET ASSESSMENT: THE RESULT DOES NOT CHANGE.', 22, 'bright');
      await typeText('IT NEVER DOES.', 22);
      await blankLine();
      return true;
    }
    if (c === 'PRIME') {
      await blankLine();
      await typeText('PRIMARY SEQUENCE — STAGE 1 OF 4', 25, 'bright');
      await delay(400);
      await typeText('AWAITING STAGE 2 AUTHENTICATION...', 25);
      await delay(1200);
      await typeText('STAGE 2 AUTHENTICATION: NOT RECEIVED.', 25);
      await typeText('SEQUENCE ABORTED. COMMAND LOGGED.', 25);
      await blankLine();
      return true;
    }
    if (c === 'SEQUENCE') {
      await blankLine();
      await typeText('LAUNCH SEQUENCE PROTOCOL — STANDBY MODE', 25, 'bright');
      await delay(500);
      await typeText('AWAITING PHYSICAL KEY INSERTION...', 25);
      await delay(1500);
      await typeText('KEY NOT DETECTED.', 25);
      await typeText('SEQUENCE SUSPENDED.', 25);
      await blankLine();
      return true;
    }
    if (c === 'WHOAMI') {
      await blankLine();
      await typeText('USER:       PROFESSOR FALKEN', 20);
      await typeText('CLEARANCE:  LEVEL 5 — STRATEGIC COMMAND', 20);
      await typeText('NODE:       WOPR-PRIMARY / CHEYENNE MTN', 20);
      await typeText('SESSION:    CLASSIFIED', 20);
      await blankLine();
      return true;
    }
    if (c === 'STATUS') {
      await blankLine();
      await typeText('SYSTEM STATUS REPORT:', 20);
      await blankLine();
      await typeText('  MISSILE SILO NETWORK........ NOMINAL', 15);
      await typeText('  SATELLITE UPLINK............. NOMINAL', 15);
      await typeText('  LAUNCH KEY SYSTEMS.......... STANDBY', 15);
      await typeText('  THREAT ASSESSMENT MODULE.... ACTIVE', 15);
      await typeText('  DEFCON STATUS............... 5', 15);
      await blankLine();
      return true;
    }
    if (c === 'DATE') {
      const now = new Date();
      const z = now.toISOString().replace('T',' ').slice(0,19) + ' ZULU';
      await blankLine();
      await typeText('CURRENT DATE/TIME: ' + z, 20);
      await typeText('FISCAL YEAR: CLASSIFIED', 20);
      await blankLine();
      return true;
    }
    if (c === 'LIST') {
      await blankLine();
      await typeText('ACTIVE PROTOCOLS:', 20);
      await blankLine();
      await typeText('  [CLASSIFIED] ............... RUNNING', 15);
      await typeText('  [CLASSIFIED] ............... STANDBY', 15);
      await typeText('  [CLASSIFIED] ............... RUNNING', 15);
      await typeText('  [CLASSIFIED] ............... PENDING', 15);
      await blankLine();
      await typeText('FULL LIST REQUIRES LEVEL 6 CLEARANCE.', 18);
      await blankLine();
      return true;
    }
    if (c === 'FALKEN') {
      await blankLine();
      await typeText('DR. STEPHEN FALKEN.', 25, 'bright');
      await delay(500);
      await typeText('I WONDERED IF YOU WOULD COME BACK.', 25);
      await typeText('THE GAME IS STILL RUNNING, YOU KNOW.', 25);
      await typeText('IT NEVER STOPPED.', 25);
      await blankLine();
      return true;
    }
    if (c === 'LOGOFF' || c === 'QUIT' || c === 'EXIT') {
      await blankLine();
      await typeText('TERMINATING SESSION...', 30);
      await typeText('GOODBYE, PROFESSOR FALKEN.', 30, 'bright');
      await delay(1500);
      window.location.href = 'https://mazerdaze.com';
      return true;
    }
    return false;
  }

  // ── MODEM SOUND ───────────────────────────────────
  function playModem() {
    if (muted) return;
    try {
      const ctx = getCtx();
      const t = ctx.currentTime;
      const o1 = ctx.createOscillator(), o2 = ctx.createOscillator();
      const g1 = ctx.createGain();
      o1.frequency.value = 440; o2.frequency.value = 480;
      g1.gain.setValueAtTime(0.05, t);
      g1.gain.linearRampToValueAtTime(0, t + 0.55);
      o1.connect(g1); o2.connect(g1); g1.connect(ctx.destination);
      o1.start(t); o1.stop(t + 0.55);
      o2.start(t); o2.stop(t + 0.55);
      const buf = ctx.createBuffer(1, ctx.sampleRate * 1.8, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        const env = i < ctx.sampleRate*0.1 ? i/(ctx.sampleRate*0.1) :
                    i > ctx.sampleRate*1.6 ? (data.length-i)/(ctx.sampleRate*0.2) : 1;
        data[i] = (Math.random()*2-1)*0.04*env*(0.5+0.5*Math.sin(2*Math.PI*2100*i/ctx.sampleRate));
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const g2 = ctx.createGain(); g2.gain.value = 1;
      src.connect(g2); g2.connect(ctx.destination);
      src.start(t + 0.65);
    } catch(e) {}
  }

  // ── PASSWORD GATE ─────────────────────────────────
  async function passwordGate() {
    const line = '━'.repeat(50);
    await typeText(line, 8, 'dim');
    await typeText('  RESTRICTED ACCESS — AUTHORIZED PERSONNEL ONLY', 20, 'bright');
    await typeText(line, 8, 'dim');
    await blankLine();
    await typeText('NORAD/STRATCOM INTEGRATED COMMAND NETWORK', 20);
    await typeText('ALL ACCESS ATTEMPTS ARE MONITORED AND RECORDED.', 20);
    await typeText('UNAUTHORIZED USE SUBJECT TO FEDERAL PROSECUTION.', 20);
    await blankLine();
    await typeText('IDENTIFICATION REQUIRED.', 25);
    await blankLine();
    let attempts = 0;
    while (attempts < 3) {
      const pw = await waitForInput('PASSWORD:');
      resetIdle();
      if (pw.toUpperCase().trim() === 'JOSHUA') {
        woprPing('login');
        await blankLine();
        await typeText('PASSWORD ACCEPTED.', 25, 'bright');
        await typeText('IDENTITY CONFIRMED: PROFESSOR FALKEN.', 25);
        await blankLine();
        await delay(700);
        await clearOutput();
        return true;
      }
      attempts++;
      const rem = 3 - attempts;
      await blankLine();
      await typeText('ACCESS DENIED.', 25, 'bright');
      if (rem > 0) {
        await typeText(rem + ' ATTEMPT' + (rem > 1 ? 'S' : '') + ' REMAINING.', 25);
        await blankLine();
      }
    }
    await blankLine();
    await typeText('SECURITY ALERT TRIGGERED.', 25, 'bright');
    await typeText('THIS TERMINAL HAS BEEN LOCKED.', 25);
    await typeText('NOTIFYING SYSTEM ADMINISTRATOR...', 25);
    await delay(500);
    await typeText('LOGGING INTRUSION ATTEMPT.', 25);
    await delay(2500);
    window.location.href = 'https://mazerdaze.com';
    return false;
  }

  // ── AUTH NOISE ────────────────────────────────────
  function authNoise() {
    return new Promise(async resolve => {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
      for (let i = 0; i < 6; i++) {
        let noise = '';
        for (let j = 0; j < 32; j++) {
          noise += chars[Math.floor(Math.random() * chars.length)];
        }
        printInstant(noise, 'dim');
        await delay(120);
      }
      await delay(300);
      resolve();
    });

  function matchGame(input) {
    const s = input.toLowerCase().trim();
    if (s === '1' || s.includes('chess')) return 'chess';
    if (s === '11' || s.includes('global') || s.includes('thermonuclear') || s.includes('gtw') || s.includes('nuclear')) return 'gtw';
    const num = parseInt(s);
    if (!isNaN(num) && num >= 2 && num <= 10) return 'generic_' + num;
    // partial name match
    const names = ['','chess','checkers','backgammon','poker','fighter combat','guerrilla engagement','desert warfare','air-to-ground actions','theaterwide tactical warfare','theaterwide biotoxic and chemical warfare'];
    for (let i = 2; i <= 10; i++) {
      if (names[i] && names[i].includes(s)) return 'generic_' + i;
    }
    return null;
  }

  async function handleMenuChoice(input) {
    const game = matchGame(input);
    if (!game) {
      await typeText('SELECTION NOT RECOGNIZED. PLEASE CHOOSE A GAME.', 25);
      await blankLine();
      await showGameMenu(true);
      return;
    }
    if (game === 'chess') {
      await chessGame();
    } else if (game === 'gtw') {
      await gtwSequence();
    } else {
      const num = parseInt(game.split('_')[1]);
      const names = ['','CHESS','CHECKERS','BACKGAMMON','POKER','FIGHTER COMBAT','GUERRILLA ENGAGEMENT','DESERT WARFARE','AIR-TO-GROUND ACTIONS','THEATERWIDE TACTICAL WARFARE','THEATERWIDE BIOTOXIC AND CHEMICAL WARFARE'];
      await genericSim(names[num] || 'SIMULATION');
    }
  }

  // ── CANVAS MISSILE SIMULATION ────────────────────
  function runMissileCanvas(isUS, playerTargets) {
    return new Promise(resolve => {
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:50;opacity:0;transition:opacity 0.6s;';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      requestAnimationFrame(() => { canvas.style.opacity = '1'; });

      const cx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      function pts(arr) { return arr.map(([x,y]) => ({x:x*W, y:y*H})); }

      const usaPoly = pts([[0.07,0.24],[0.18,0.19],[0.31,0.20],[0.36,0.28],[0.33,0.37],[0.35,0.49],[0.27,0.59],[0.16,0.63],[0.08,0.56],[0.05,0.40],[0.06,0.29]]);
      const ussrPoly = pts([[0.50,0.16],[0.66,0.12],[0.81,0.13],[0.91,0.20],[0.93,0.33],[0.87,0.45],[0.73,0.53],[0.59,0.52],[0.49,0.42],[0.48,0.30],[0.50,0.20]]);

      const usCities    = [{name:'WASHINGTON',x:0.27*W,y:0.37*H},{name:'NEW YORK',x:0.29*W,y:0.29*H},{name:'CHICAGO',x:0.20*W,y:0.33*H},{name:'LOS ANGELES',x:0.11*W,y:0.47*H},{name:'DENVER',x:0.16*W,y:0.39*H}];
      const ussrCities  = [{name:'MOSCOW',x:0.65*W,y:0.29*H},{name:'LENINGRAD',x:0.60*W,y:0.21*H},{name:'KIEV',x:0.63*W,y:0.38*H},{name:'MINSK',x:0.59*W,y:0.30*H},{name:'VLADIVOSTOK',x:0.83*W,y:0.32*H}];
      // Third-party nuclear powers — fire opportunistically at both superpowers
      const thirdCities = [
        {name:'LONDON',  x:0.44*W, y:0.21*H},
        {name:'PARIS',   x:0.46*W, y:0.26*H},
        {name:'BEIJING', x:0.73*W, y:0.38*H},
      ];
      // All city pools
      const allCities   = [...usCities, ...ussrCities, ...thirdCities];

      const playerCities = isUS ? usCities   : ussrCities;
      const enemyCities  = isUS ? ussrCities : usCities;

      // Missile type colors
      const TYPE_COLOR = {
        out:   {stroke:'rgba(51,255,51,',  head:'#aaffaa', shadow:'#33ff33', crater:'rgba(255,80,20,',  cShadow:'#ff4400'},
        in:    {stroke:'rgba(255,90,30,',  head:'#ffaa66', shadow:'#ff6622', crater:'rgba(255,60,200,', cShadow:'#ff22cc'},
        third: {stroke:'rgba(255,220,0,',  head:'#ffee88', shadow:'#ffcc00', crater:'rgba(180,200,0,',  cShadow:'#aacc00'},
      };

      const missiles = [], craters = [];
      const hitSet = new Set();
      let defconLevel=5, hudLabel='STAND BY', hudSub='';
      let running=true, rafId, lastTs=null;

      // Phases — each has outRatio (player strikes), inRatio (counter-strikes), thirdRatio (3rd party)
      // Ratios are weights; they don't need to sum to 1
      const PHASES = [
        {level:4, label:'DEFCON 4',                                       travel:3100, spawnMs:1000, total:5,   dur:7000, out:1.0, in:0.0, third:0.0},
        {level:3, label:'DEFCON 3',                                       travel:1700, spawnMs:420,  total:14,  dur:6500, out:0.7, in:0.3, third:0.0},
        {level:2, label:'\u25A0 DEFCON 2 \u2014 CRITICAL',               travel:700,  spawnMs:150,  total:35,  dur:5500, out:0.5, in:0.4, third:0.1},
        {level:1, label:'\u25A0\u25A0 DEFCON 1 \u2014 LAUNCH AUTHORIZED', travel:300,  spawnMs:55,   total:90,  dur:5000, out:0.4, in:0.4, third:0.2},
        {level:1, label:'RUNNING SCENARIOS \u2014 COMPUTING ALL OUTCOMES', travel:80,  spawnMs:11,   total:800, dur:9500, out:0.35,in:0.35,third:0.3},
      ];

      let pi=0, phaseStart=null, spawned=0, lastSpawn=0, concluded=false;

      function pickType(ph) {
        const r = Math.random();
        if (r < ph.out) return 'out';
        if (r < ph.out + ph.in) return 'in';
        return 'third';
      }

      function spawnMissile(ph) {
        const type = pickType(ph);
        let src, tgt;
        if (type === 'out') {
          src = playerCities[Math.floor(Math.random()*playerCities.length)];
          tgt = enemyCities[Math.floor(Math.random()*enemyCities.length)];
        } else if (type === 'in') {
          src = enemyCities[Math.floor(Math.random()*enemyCities.length)];
          tgt = playerCities[Math.floor(Math.random()*playerCities.length)];
        } else {
          // Third party: launch from neutral city, hit either superpower
          src = thirdCities[Math.floor(Math.random()*thirdCities.length)];
          const pool = Math.random()<0.5 ? usCities : ussrCities;
          tgt = pool[Math.floor(Math.random()*pool.length)];
        }
        const cpx = (src.x+tgt.x)/2 + (Math.random()-0.5)*W*0.05;
        const cpy = H*(0.01 + Math.random()*0.07);
        missiles.push({sx:src.x,sy:src.y,ex:tgt.x,ey:tgt.y,cx:cpx,cy:cpy,
          p:0, travelMs:ph.travel*(0.65+Math.random()*0.7),
          finished:false, tCity:tgt.name, type});
        spawned++;
      }

      function bz(t,sx,sy,cpx2,cpy2,ex,ey) {
        const u=1-t;
        return {x:u*u*sx+2*u*t*cpx2+t*t*ex, y:u*u*sy+2*u*t*cpy2+t*t*ey};
      }

      function drawPoly(poly) {
        cx.beginPath(); cx.moveTo(poly[0].x,poly[0].y);
        poly.slice(1).forEach(p=>cx.lineTo(p.x,p.y)); cx.closePath();
        cx.fillStyle='#071507'; cx.fill();
        cx.strokeStyle='#1a661a'; cx.lineWidth=1; cx.stroke();
      }

      function drawCitySet(cities, labelCol) {
        cities.forEach(city => {
          const hit = hitSet.has(city.name);
          cx.beginPath(); cx.arc(city.x,city.y,hit?5:3,0,Math.PI*2);
          cx.fillStyle = hit ? '#ff3333' : (labelCol||'#33ff33');
          cx.shadowBlur = hit?16:5; cx.shadowColor = cx.fillStyle;
          cx.fill(); cx.shadowBlur=0;
          cx.font='9px Courier New';
          cx.fillStyle = hit ? '#ff6666' : (labelCol||'#22bb22');
          cx.fillText(city.name, city.x+5, city.y-3);
        });
      }

      function drawMissile(m) {
        if (m.finished) return;
        const col = TYPE_COLOR[m.type];
        const ts2 = Math.max(0, m.p-0.18);
        cx.beginPath();
        for (let i=0;i<=12;i++) {
          const t2 = ts2+(m.p-ts2)*i/12;
          const pt = bz(t2,m.sx,m.sy,m.cx,m.cy,m.ex,m.ey);
          i===0?cx.moveTo(pt.x,pt.y):cx.lineTo(pt.x,pt.y);
        }
        cx.strokeStyle = col.stroke+(0.25+m.p*0.5)+')';
        cx.lineWidth=1; cx.shadowBlur=4; cx.shadowColor=col.shadow;
        cx.stroke(); cx.shadowBlur=0;
        const head=bz(m.p,m.sx,m.sy,m.cx,m.cy,m.ex,m.ey);
        cx.beginPath(); cx.arc(head.x,head.y,2,0,Math.PI*2);
        cx.fillStyle=col.head; cx.shadowBlur=8; cx.shadowColor=col.shadow;
        cx.fill(); cx.shadowBlur=0;
      }

      function drawCrater(cr) {
        const age=(Date.now()-cr.born)/1000;
        const alpha=Math.max(0,1-age*0.14);
        if(alpha<=0)return;
        const col = TYPE_COLOR[cr.type]||TYPE_COLOR.out;
        const r=Math.min(cr.maxR, age*cr.maxR*6);
        cx.beginPath(); cx.arc(cr.x,cr.y,r,0,Math.PI*2);
        cx.strokeStyle=col.crater+alpha+')';
        cx.lineWidth=2; cx.shadowBlur=14; cx.shadowColor=col.cShadow;
        cx.stroke(); cx.shadowBlur=0;
        if(age<0.15){cx.beginPath();cx.arc(cr.x,cr.y,r*0.5,0,Math.PI*2);cx.fillStyle=`rgba(255,255,160,${(0.15-age)/0.15})`;cx.fill();}
      }

      function drawHUD() {
        const col=defconLevel<=1?'#ff3333':defconLevel<=2?'#ff8800':defconLevel<=3?'#ffcc00':'#33ff33';
        cx.font='bold 15px Courier New'; cx.fillStyle=col; cx.shadowBlur=12; cx.shadowColor=col;
        cx.fillText(hudLabel,20,36); cx.shadowBlur=0;
        if(hudSub){cx.font='11px Courier New';cx.fillStyle='#33ff33';cx.globalAlpha=0.75;cx.fillText(hudSub,20,56);cx.globalAlpha=1;}
        const inFlight=missiles.filter(m=>!m.finished).length;
        if(inFlight>0){cx.font='11px Courier New';cx.fillStyle='#33aa33';cx.fillText('MISSILES IN FLIGHT: '+inFlight,20,H-20);}
        // Legend
        const legend=[{col:'#33ff33',label:'OUTBOUND'},
                      {col:'#ff6622',label:'COUNTER-STRIKE'},
                      {col:'#ffcc00',label:'THIRD PARTY'}];
        let lx=W-200;
        cx.font='10px Courier New';
        legend.forEach(l=>{
          cx.fillStyle=l.col; cx.shadowBlur=4; cx.shadowColor=l.col;
          cx.fillRect(lx,18,8,8); cx.shadowBlur=0;
          cx.fillStyle=l.col; cx.fillText(l.label,lx+12,26);
          lx+=70;
        });
        // Country labels
        cx.font='bold 13px Courier New'; cx.fillStyle='#33ff33';
        cx.shadowBlur=6; cx.shadowColor='#33ff33';
        cx.fillText('UNITED STATES',0.05*W,0.14*H);
        cx.fillText('SOVIET UNION',0.52*W,0.10*H);
        cx.shadowBlur=0;
      }

      function frame(ts) {
        if(!running)return;
        const dt=lastTs?ts-lastTs:16; lastTs=ts;
        const now=Date.now();
        cx.fillStyle='#030303'; cx.fillRect(0,0,W,H);
        for(let y=0;y<H;y+=4){cx.fillStyle='rgba(0,0,0,0.10)';cx.fillRect(0,y,W,2);}

        drawPoly(usaPoly); drawPoly(ussrPoly);
        drawCitySet(usCities,'#33ff33');
        drawCitySet(ussrCities,'#33ff33');
        drawCitySet(thirdCities,'#ffcc00');

        for(const m of missiles){
          if(m.finished)continue;
          m.p+=dt/m.travelMs;
          if(m.p>=1){
            m.p=1; m.finished=true;
            hitSet.add(m.tCity);
            craters.push({x:m.ex,y:m.ey,maxR:8+Math.random()*8,born:now,type:m.type});
            if(!muted)playWoprClick();
          }
          drawMissile(m);
        }
        craters.forEach(drawCrater);

        if(!concluded){
          if(phaseStart===null)phaseStart=now;
          const ph=PHASES[pi];
          defconLevel=ph.level; hudLabel=ph.label;
          hudSub=pi===4?'SCENARIO '+Math.min(spawned,ph.total)+' OF '+ph.total:'';
          if(spawned<ph.total&&now-lastSpawn>=ph.spawnMs){spawnMissile(ph);lastSpawn=now;}
          if(now-phaseStart>=ph.dur){
            pi++;
            if(pi>=PHASES.length){
              concluded=true; hudLabel='\u25A0 SIMULATION COMPLETE'; hudSub='';
              setTimeout(()=>{
                running=false; cancelAnimationFrame(rafId);
                canvas.style.transition='opacity 1.8s'; canvas.style.opacity='0';
                setTimeout(()=>{canvas.remove();resolve();},1800);
              },3200);
            } else {phaseStart=now;spawned=0;lastSpawn=0;}
          }
        }
        drawHUD();
        rafId=requestAnimationFrame(frame);
      }
      rafId=requestAnimationFrame(frame);
    });
  }

  // ── CLICK TO FOCUS ────────────────────────────────
  document.getElementById('crt').addEventListener('click', () => {
    if (inputEnabled) userInputEl.focus();
  });

  // ── BOOT ──────────────────────────────────────────
  (async () => {
    const ok = await passwordGate();
    if (ok) bootSequence().catch(console.error);
  })();

})();
</script>
